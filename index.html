<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>語音對話 Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { color: #00d4ff; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #0f3460;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      transition: all 0.2s;
    }
    .mode-btn:hover { border-color: #00d4ff; color: #fff; }
    .mode-btn.active { border-color: #00d4ff; background: #00d4ff20; color: #00d4ff; }
    
    .chat-container {
      height: 300px;
      overflow-y: auto;
      padding: 16px;
      background: #0f3460;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .message {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
    }
    .message.user {
      background: #00d4ff20;
      color: #00d4ff;
      margin-left: auto;
    }
    .message.ai {
      background: #16213e;
      color: #fff;
    }
    .message.system {
      background: #ff6b6b20;
      color: #ff6b6b;
      font-size: 12px;
      text-align: center;
    }
    .message.transcribing {
      background: #ffaa0020;
      color: #ffaa00;
      font-style: italic;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .call-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #00d4ff;
      background: #0f3460;
      color: #00d4ff;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .call-btn:hover { background: #00d4ff20; }
    .call-btn.recording {
      background: #ff4444;
      border-color: #ff4444;
      color: #fff;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .hangup-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #ff4444;
      background: #0f3460;
      color: #ff4444;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hangup-btn:hover { background: #ff444420; }
    .hangup-btn.hidden { display: none; }
    
    .text-input {
      flex: 1;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .text-input:focus { border-color: #00d4ff; }
    
    .send-btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: #00d4ff;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .status {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }
    .status.loading { display: block; background: #00d4ff20; color: #00d4ff; }
    .status.error { display: block; background: #ff444420; color: #ff6666; }
    .status.success { display: block; background: #44ff4420; color: #66ff66; }
    
    .settings {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 16px;
    }
    .settings select {
      background: #0f3460;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      color: #fff;
    }
    .settings input {
      background: #0f3460;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      color: #fff;
      width: 200px;
    }
    .settings label { margin-left: 10px; }
    
    .api-section {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .api-section input {
      flex: 1;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 14px;
    }
    
    audio.response-audio {
      width: 100%;
      margin-top: 8px;
      display: none;
    }
    
    .waveform {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      height: 40px;
      margin: 10px 0;
    }
    .waveform.hidden { display: none; }
    .wave-bar {
      width: 4px;
      height: 20px;
      background: #00d4ff;
      border-radius: 2px;
      animation: wave 0.5s ease-in-out infinite;
    }
    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    @keyframes wave {
      0%, 100% { height: 20px; }
      50% { height: 35px; }
    }
  </style>
</head>
<body>
  <h1>🎙️ 語音對話</h1>
  <p class="subtitle">選擇模式：單次對話 或 持續通話</p>
  
  <div class="card">
    <div class="chat-container" id="chatContainer">
      <div class="message system">🎙️ 點擊麥克風開始語音對話</div>
    </div>
    
    <div class="waveform hidden" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    
    <div class="controls" id="callControls">
      <button class="call-btn" id="callBtn">🎤</button>
      <button class="hangup-btn hidden" id="hangupBtn">📴</button>
    </div>
    
    <div id="status" class="status"></div>
    <audio id="responseAudio" class="response-audio" controls></audio>
  </div>

  <script>
    let mode = 'call'; // 'single' or 'call'
    let isRecording = false;
    let ws = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let wsConnected = false;
    
    // Backend URL (fixed)
    const BACKEND_URL = 'https://voice-chat-backend-production.up.railway.app';
    const WS_URL = BACKEND_URL.replace('http', 'ws') + '/ws/voice';
    
    // ============ CALL MODE (WebSocket) ============
    
    function startCall() {
      addMessage('system', '連接中...');
      
      ws = new WebSocket(WS_URL);
      
      ws.onopen = () => {
        console.log('WebSocket connected');
        wsConnected = true;
        addMessage('system', '已連接，開始說話...');
        document.getElementById('callBtn').classList.add('recording');
        document.getElementById('callBtn').textContent = '🎤';
        document.getElementById('hangupBtn').classList.remove('hidden');
        document.getElementById('waveform').classList.remove('hidden');
        isRecording = true;
        startRecording();
      };
      
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          console.log('[DEBUG] WS received type:', msg.type);
          
          // DEBUG 1: Show transcription result
          if (msg.type === 'transcription') {
            console.log('[DEBUG 1] 🎤 Transcription result:', msg.text);
            addMessage('system', `🎤 辨識: ${msg.text}`);
          }
          
          // DEBUG 2: Show LLM response
          if (msg.type === 'response') {
            console.log('[DEBUG 2] 🤖 LLM response:', msg.response);
            addMessage('system', `🤖 LLM回覆: ${msg.response}`);
          }
          
          // DEBUG 3: Show TTS audio received
          if (msg.type === 'audio') {
            console.log('[DEBUG 3] 🔊 TTS audio received, length:', msg.data ? msg.data.length : 0);
            addMessage('system', `🔊 TTS音頻收到 (${msg.data ? msg.data.length : 0} bytes)`);
          }
          
          if (msg.type === 'error') {
            console.error('[DEBUG] ❌ Error from server:', msg.message);
            addMessage('system', `❌ 錯誤: ${msg.message}`);
          }
          
          handleWsMessage(msg);
        } catch (e) {
          console.error('Failed to parse WebSocket message:', e);
        }
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        addMessage('system', '連接錯誤');
        stopCall();
      };
      
      ws.onclose = () => {
        console.log('WebSocket closed');
        wsConnected = false;
        isRecording = false;
        document.getElementById('callBtn').classList.remove('recording');
        document.getElementById('callBtn').textContent = '🎤';
        document.getElementById('hangupBtn').classList.add('hidden');
        document.getElementById('waveform').classList.add('hidden');
        addMessage('system', '連接已結束');
      };
    }
    
    function stopCall() {
      console.log('[DEBUG] stopCall() called');
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
      }
      // Close ws after a delay to allow any final audio to be sent and response received
      setTimeout(() => {
        if (ws) {
          ws.send(JSON.stringify({ type: 'reset' }));
          ws.close();
          console.log('[DEBUG] WS closed');
        }
      }, 3000);
    }
    
    function handleWsMessage(msg) {
      switch (msg.type) {
        case 'transcription':
          if (msg.text) {
            addMessage('user', `🎤 ${msg.text}`);
          }
          break;
        case 'response':
          addMessage('ai', msg.text);
          break;
        case 'audio':
          if (msg.data) {
            console.log('[DEBUG 3] 🔊 TTS audio received, data length:', msg.data.length);
            // Only play if audio is large enough (valid audio should be several KB minimum)
            if (msg.data.length > 1000) {
              addMessage('system', `🔊 播放音頻 (${msg.data.length} bytes)`);
              const audio = document.getElementById('responseAudio');
              audio.src = 'data:audio/mp3;base64,' + msg.data;
              audio.style.display = 'block';
              audio.play().catch(err => {
                console.error('[DEBUG] Audio play error:', err);
                addMessage('system', `❌ 播放失敗: ${err}`);
              });
            } else {
              console.error('[DEBUG] Audio data too small, likely invalid:', msg.data.substring(0, 100));
              addMessage('system', `❌ TTS 無效音頻 (${msg.data.length} bytes，可能是文字太短或語言不支援)`);
            }
          }
          break;
        case 'reset':
          console.log('Conversation reset');
          break;
        case 'error':
          addMessage('system', '錯誤: ' + msg.message);
          break;
      }
    }
    
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Try different audio formats for Whisper compatibility
        const mimeTypes = ['audio/mpeg', 'audio/ogg', 'audio/webm;codecs=opus', 'audio/webm'];
        let mimeType = mimeTypes.find(t => MediaRecorder.isTypeSupported(t)) || 'audio/webm';
        
        console.log('Using MIME type:', mimeType);
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        
        // Accumulate audio chunks
        mediaRecorder.ondataavailable = event => {
          console.log('Audio chunk received, MIME:', event.data.type, 'size:', event.data.size);
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };
        
        // When recording stops, combine all chunks and send as one audio file
        mediaRecorder.onstop = () => {
          console.log('[DEBUG] Recording stopped, chunks:', audioChunks.length);
          stream.getTracks().forEach(track => track.stop());
          
          if (audioChunks.length > 0 && ws && wsConnected) {
            const audioBlob = new Blob(audioChunks, { type: mimeType });
            const reader = new FileReader();
            reader.onload = () => {
              const base64 = reader.result.split(',')[1];
              console.log('[DEBUG 0] 📤 Sending complete audio, type:', mimeType, 'base64 length:', base64.length);
              addMessage('system', `🎤 錄音結束，發送中...`);
              ws.send(JSON.stringify({ type: 'audio', data: base64, language: 'zh' }));
            };
            reader.readAsDataURL(audioBlob);
          } else {
            addMessage('system', `❌ 沒有音頻數據`);
          }
        };
        
        mediaRecorder.start(1000); // Collect data every second
        console.log('Recording started, will send chunks every second');
        
      } catch (error) {
        console.error('Failed to start recording:', error);
        addMessage('system', '無法訪問麥克風: ' + error.message);
        stopCall();
      }
    }
    
    document.getElementById('callBtn').addEventListener('click', () => {
      if (isRecording) {
        stopCall();
      } else {
        startCall();
      }
    });
    
    document.getElementById('hangupBtn').addEventListener('click', stopCall);
    
    // ============ SINGLE MODE (REST API) ============
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
    
    async function sendMessage() {
      const text = document.getElementById('textInput').value.trim();
      const backendUrl = document.getElementById('backendUrl').value.trim();
      
      if (!text) return;
      
      addMessage('user', text);
      document.getElementById('textInput').value = '';
      
      showStatus('處理中...', 'loading');
      
      try {
        const response = await fetch(backendUrl + '/text-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        
        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        addMessage('ai', data.response);
        showStatus('生成語音...', 'loading');
        
        // Convert to speech
        const ttsResponse = await fetch(backendUrl + '/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            text: data.response,
            provider: 'minimax',
            voice: document.getElementById('voice').value
          })
        });
        
        const ttsData = await ttsResponse.json();
        
        if (ttsData.audio) {
          const audio = document.getElementById('responseAudio');
          audio.src = 'data:audio/mp3;base64,' + ttsData.audio;
          audio.style.display = 'block';
          audio.play().catch(() => {});
        }
        
        showStatus('完成', 'success');
        
      } catch (error) {
        showStatus('錯誤: ' + error.message, 'error');
      }
    }
    
    // ============ UTILITIES ============
    
    function addMessage(type, text) {
      const container = document.getElementById('chatContainer');
      const div = document.createElement('div');
      div.className = 'message ' + type;
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    
    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
      if (type !== 'loading') {
        setTimeout(() => { el.style.display = 'none'; }, 3000);
      } else {
        el.style.display = 'block';
      }
    }
    
    // Initialize
    // Call mode starts when user clicks microphone
  </script>
</body>
</html>
