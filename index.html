<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>語音對話 Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { color: #00d4ff; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .chat-container {
      max-height: 400px;
      overflow-y: auto;
      padding: 16px;
      background: #0f1629;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .message {
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    
    .message.system {
      background: #1e3a5f;
      color: #88c4f8;
      font-size: 14px;
    }
    
    .message.user {
      background: #2563eb;
      color: white;
      margin-left: 20px;
    }
    
    .message.ai {
      background: #059669;
      color: white;
      margin-right: 20px;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .call-btn, .hangup-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .call-btn {
      background: #2563eb;
      color: white;
    }
    
    .call-btn:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }
    
    .call-btn.recording {
      background: #dc2626;
      animation: pulse 1.5s infinite;
    }
    
    .hangup-btn {
      background: #6b7280;
      color: white;
    }
    
    .hangup-btn:hover {
      background: #4b5563;
    }
    
    .hidden { display: none !important; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .waveform {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .wave-bar {
      width: 6px;
      height: 30px;
      background: #2563eb;
      border-radius: 3px;
      animation: wave 1s ease-in-out infinite;
    }
    
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    
    @keyframes wave {
      0%, 100% { height: 10px; opacity: 0.5; }
      50% { height: 40px; opacity: 1; }
    }
    
    .response-audio {
      width: 100%;
      margin-top: 16px;
      display: none;
    }
    
    .status {
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>🎙️ 語音對話</h1>
  <p class="subtitle">即時持續語音對話 - 說完一句話後無需掛斷</p>
  
  <div class="card">
    <div class="chat-container" id="chatContainer">
      <div class="message system">🎙️ 點擊麥克風開始持續語音對話</div>
    </div>
    
    <div class="waveform hidden" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    
    <div class="controls" id="callControls">
      <button class="call-btn" id="callBtn">🎤</button>
      <button class="hangup-btn hidden" id="hangupBtn">📴</button>
    </div>
    
    <div id="status" class="status"></div>
    <audio id="responseAudio" class="response-audio" controls></audio>
  </div>
  
  <script>
    // Voice Chat Frontend - Real-time Continuous Mode
    // Implements VAD (Voice Activity Detection) for seamless voice conversations

    const BACKEND_URL = 'https://voice-chat-backend-production.up.railway.app';
    const WS_URL = BACKEND_URL.replace('http', 'ws') + '/ws/voice';

    // Recording state
    let ws = null;
    let wsConnected = false;
    let isRecording = false;
    let mediaRecorder = null;
    let audioContext = null;
    let analyser = null;
    let audioChunks = [];
    let silenceTimer = null;
    let isProcessing = false; // Track if we're waiting for server response
    let currentStream = null;

    // VAD settings
    const SILENCE_THRESHOLD = 5; // Audio level below this is silence (0-255)
    const SPEECH_THRESHOLD = 15; // Must be this loud to be considered speech (hysteresis)
    const SILENCE_DURATION = 2000; // 2 seconds of silence triggers processing
    let silenceStart = null; // Track when silence began

    // DOM elements
    const chatContainer = document.getElementById('chatContainer');

    function addMessage(type, text) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function clearChat() {
      chatContainer.innerHTML = '';
    }

    function startCall() {
      clearChat();
      addMessage('system', '🔄 連接中...');
      
      ws = new WebSocket(WS_URL);
      
      ws.onopen = () => {
        console.log('[DEBUG WS] ✅ WebSocket connected');
        addMessage('system', '✅ 已連接，開始監聽...');
        wsConnected = true;
        isRecording = true;
        isProcessing = false;
        document.getElementById('callBtn').classList.add('recording');
        document.getElementById('callBtn').textContent = '🎤';
        document.getElementById('hangupBtn').classList.remove('hidden');
        document.getElementById('waveform').classList.remove('hidden');
        startRecording();
      };
      
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          console.log('[DEBUG WS] 📥 Received type:', msg.type);
          
          switch (msg.type) {
            case 'transcription':
              console.log('[DEBUG 1] 🎤 Transcription:', msg.text);
              addMessage('system', `🎤 辨識: ${msg.text}`);
              addMessage('user', `👤 ${msg.text}`);
              break;
              
            case 'response':
              console.log('[DEBUG 2] 🤖 LLM Response:', msg.response);
              addMessage('system', `🤖 回覆: ${msg.response}`);
              addMessage('ai', `🤖 ${msg.response}`);
              break;
              
            case 'audio':
              console.log('[DEBUG 3] 🔊 TTS audio received, size:', msg.data ? msg.data.length : 0);
              if (msg.data && msg.data.length > 1000) {
                addMessage('system', `🔊 播放音頻 (${msg.data.length} bytes)`);
                const audio = document.getElementById('responseAudio');
                audio.src = 'data:audio/mp3;base64,' + msg.data;
                audio.style.display = 'block';
                audio.play().then(() => {
                  console.log('[DEBUG 3] 🔊 Audio playing, restarting VAD monitoring...');
                  // Audio finished playing, restart recording cycle
                  setTimeout(() => {
                    isProcessing = false;
                    if (wsConnected && isRecording) {
                      console.log('[DEBUG VAD] 🔄 Restarting recording after audio playback');
                      restartRecording();
                    }
                  }, 500);
                }).catch(err => {
                  console.error('[DEBUG 3] ❌ Audio play error:', err);
                  addMessage('system', `❌ 播放失敗`);
                  // Still restart recording on error
                  isProcessing = false;
                  if (wsConnected && isRecording) restartRecording();
                });
              } else {
                console.error('[DEBUG 3] ❌ TTS audio too small:', msg.data ? msg.data.length : 0);
                addMessage('system', `❌ TTS 無效`);
                // Still restart recording on error
                isProcessing = false;
                if (wsConnected && isRecording) restartRecording();
              }
              break;
              
            case 'reset':
              console.log('[DEBUG WS] 🔄 Conversation reset');
              break;
              
            case 'error':
              console.error('[DEBUG WS] ❌ Error from server:', msg.message);
              addMessage('system', `❌ 錯誤: ${msg.message}`);
              // Restart recording after error
              setTimeout(() => {
                isProcessing = false;
                if (wsConnected && isRecording) restartRecording();
              }, 1000);
              break;
          }
        } catch (e) {
          console.error('[DEBUG WS] ❌ Failed to parse message:', e);
        }
      };
      
      ws.onerror = (error) => {
        console.error('[DEBUG WS] ❌ WebSocket error:', error);
        addMessage('system', '❌ 連接錯誤');
        stopCall();
      };
      
      ws.onclose = (event) => {
        console.log('[DEBUG WS] 🔌🔌 WebSocket closed', event.code, event.reason);
        addMessage('system', `🔌 連接已結束 (${event.code})`);
        wsConnected = false;
        isRecording = false;
        document.getElementById('callBtn').classList.remove('recording');
        document.getElementById('callBtn').textContent = '🎤';
        document.getElementById('hangupBtn').classList.add('hidden');
        document.getElementById('waveform').classList.add('hidden');
        stopVADMonitoring();
      };
    }

    function stopCall() {
      console.log('[DEBUG] 🛑 stopCall() called');
      isRecording = false;
      stopVADMonitoring();
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }
      if (ws && wsConnected) {
        ws.send(JSON.stringify({ type: 'reset' }));
        ws.close();
        wsConnected = false;
      }
    }

    async function startRecording() {
      try {
        console.log('[DEBUG RECORD] 🎙️ Starting recording...');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        currentStream = stream;
        
        // Set up audio context for VAD
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.3;
        source.connect(analyser);
        
        // Try different audio formats for Whisper compatibility
        const mimeTypes = ['audio/mpeg', 'audio/ogg', 'audio/webm;codecs=opus', 'audio/webm'];
        let mimeType = mimeTypes.find(t => MediaRecorder.isTypeSupported(t)) || 'audio/webm';
        console.log('[DEBUG RECORD] 📋 Using MIME type:', mimeType);
        
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        
        mediaRecorder.ondataavailable = event => {
          console.log('[DEBUG RECORD] 📦 Audio chunk received, size:', event.data.size);
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = () => {
          console.log('[DEBUG RECORD] 🛑 Recording stopped, chunks:', audioChunks.length);
          stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start(1000); // Collect data every second
        console.log('[DEBUG RECORD] ✅ Recording started');
        addMessage('system', '🎙️ 開始說話...');
        
        // Start VAD monitoring
        startVADMonitoring();
        
      } catch (error) {
        console.error('[DEBUG RECORD] ❌ Failed to start recording:', error);
        addMessage('system', '❌ 無法訪問麥克風: ' + error.message);
        stopCall();
      }
    }

    function startVADMonitoring() {
      console.log('[DEBUG VAD] 🔍 Starting VAD monitoring...');
      stopVADMonitoring();
      silenceStart = null; // Reset silence tracker
      
      if (!analyser) {
        console.log('[DEBUG VAD] ❌ No analyser available');
        return;
      }
      
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      silenceTimer = setInterval(() => {
        if (!isRecording || isProcessing) return;
        
        analyser.getByteFrequencyData(dataArray);
        // Calculate average audio level
        const sum = dataArray.reduce((a, b) => a + b, 0);
        const average = sum / dataArray.length;
        
        console.log('[DEBUG VAD] 📊 Audio level:', average.toFixed(1), average < SILENCE_THRESHOLD ? '(silence)' : '(speech)');
        
        if (average < SILENCE_THRESHOLD) {
          // Silence detected
          if (!silenceStart) {
            silenceStart = Date.now();
            console.log('[DEBUG VAD] 🔇 Silence started at:', new Date().toLocaleTimeString());
          } else {
            const silenceDuration = Date.now() - silenceStart;
            if (silenceDuration >= SILENCE_DURATION) {
              console.log('[DEBUG VAD] ✅✅ Silence for 2s detected, triggering send!');
              silenceStart = null;
              silenceDetected();
            }
          }
        } else if (average > SPEECH_THRESHOLD) {
          // Clear speech detected (using hysteresis to avoid reset from quiet sounds)
          if (silenceStart) {
            console.log('[DEBUG VAD] 🔊🔊 Clear speech detected, resetting silence timer');
          }
          silenceStart = null;
        }
        // If between SILENCE_THRESHOLD and SPEECH_THRESHOLD, keep current state
      }, 200); // Check every 200ms
    }

    function stopVADMonitoring() {
      if (silenceTimer) {
        clearInterval(silenceTimer);
        silenceTimer = null;
        console.log('[DEBUG VAD] 🛑 VAD monitoring stopped');
      }
    }

    function silenceDetected() {
      if (isProcessing) {
        console.log('[DEBUG VAD] ⏳ Already processing, skipping');
        return;
      }
      
      console.log('[DEBUG VAD] 📤 Silence detected, preparing to send audio');
      
      if (audioChunks.length === 0) {
        console.log('[DEBUG VAD] ⚠️ No audio chunks accumulated');
        return;
      }
      
      isProcessing = true;
      
      // Stop current recording
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      
      // Get the MIME type from mediaRecorder
      const mimeType = mediaRecorder ? mediaRecorder.mimeType : 'audio/webm';
      
      // Combine all chunks
      const audioBlob = new Blob(audioChunks, { type: mimeType });
      const reader = new FileReader();
      
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        console.log('[DEBUG VAD] 📤📤 Sending audio NOW, chunks:', audioChunks.length, 'base64 length:', base64.length);
        addMessage('system', `📤 發送音頻 (${audioChunks.length} chunks)...`);
        
        if (ws && wsConnected) {
          ws.send(JSON.stringify({ type: 'audio', data: base64, language: 'zh' }));
          console.log('[DEBUG VAD] ✅ Audio sent, waiting for response...');
          addMessage('system', `⏳ 等待 LLM 回應...`);
        } else {
          console.error('[DEBUG VAD] ❌ WS not connected!');
          addMessage('system', `❌ WS 未連接!`);
          isProcessing = false;
        }
      };
      
      reader.readAsDataURL(audioBlob);
      
      // Reset for next recording cycle
      audioChunks = [];
    }

    function restartRecording() {
      console.log('[DEBUG RECORD] 🔄 Restarting recording...');
      
      // Small delay before restarting
      setTimeout(() => {
        if (isRecording && wsConnected && !isProcessing) {
          startRecording();
        }
      }, 300);
    }

    // Event listeners
    document.getElementById('callBtn').addEventListener('click', () => {
      if (isRecording) {
        console.log('[DEBUG] 🛑🛑 Call button clicked - STOPPING (this will cancel any pending response!)');
        addMessage('system', '🛑 手動停止');
        stopCall();
      } else {
        console.log('[DEBUG] 📞 Call button clicked - starting');
        startCall();
      }
    });

    document.getElementById('hangupBtn').addEventListener('click', stopCall);

    // Audio element ended event - restart recording after audio finishes
    document.getElementById('responseAudio').addEventListener('ended', () => {
      console.log('[DEBUG] 🔊 Audio playback ended');
    });

    // Initialize
    console.log('[DEBUG] 🚀 Voice Chat Frontend initialized');
  </script>
</body>
</html>
