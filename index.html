<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>語音對話 - OpenAI Realtime A2A</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { color: #00d4ff; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .chat-container {
      max-height: 400px;
      overflow-y: auto;
      padding: 16px;
      background: #0f1629;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .message {
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    
    .message.system { background: #1e3a5f; color: #88c4f8; font-size: 14px; }
    .message.user { background: #2563eb; color: white; margin-left: 20px; }
    .message.ai { background: #059669; color: white; margin-right: 20px; }
    
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .call-btn, .hangup-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .call-btn { background: #2563eb; color: white; }
    .call-btn:hover { background: #1d4ed8; transform: scale(1.05); }
    .call-btn.recording { background: #dc2626; animation: pulse 1.5s infinite; }
    .hangup-btn { background: #6b7280; color: white; }
    .hangup-btn:hover { background: #4b5563; }
    
    .hidden { display: none !important; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .waveform {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .wave-bar {
      width: 6px;
      height: 30px;
      background: #2563eb;
      border-radius: 3px;
      animation: wave 1s ease-in-out infinite;
    }
    
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    
    @keyframes wave {
      0%, 100% { height: 10px; opacity: 0.5; }
      50% { height: 40px; opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>🎙️ OpenAI Realtime A2A</h1>
  <p class="subtitle">原生語音輸入輸出，低延遲 2-3 秒</p>
  
  <div class="card">
    <div class="chat-container" id="chatContainer">
      <div class="message system">🎙️ 點擊麥克風開始對話</div>
    </div>
    
    <div class="waveform hidden" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    
    <div class="controls">
      <button class="call-btn" id="callBtn">🎤</button>
      <button class="hangup-btn hidden" id="hangupBtn">📴</button>
    </div>
  </div>
  
  <script>
    // OpenAI Realtime API - Direct WebSocket A2A
    const BACKEND_URL = 'https://voice-chat-backend-production.up.railway.app';
    
    let ws = null;
    let isConnected = false;
    let mediaRecorder = null;
    let audioContext = null;
    let analyser = null;
    let audioChunks = [];
    let silenceTimer = null;
    let audioElement = null;
    
    const SILENCE_THRESHOLD = 10;
    const SPEECH_THRESHOLD = 25;
    const SILENCE_DURATION = 1500;
    let silenceStart = null;
    
    const chatContainer = document.getElementById('chatContainer');
    
    function addMessage(type, text) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    function clearChat() {
      chatContainer.innerHTML = '';
    }
    
    async function startCall() {
      try {
        clearChat();
        addMessage('system', '🔄 連接 OpenAI Realtime API...');
        
        // Step 1: Get ephemeral key from our backend
        const response = await fetch(BACKEND_URL + '/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-4o-realtime-preview-2025-06-03',
            voice: 'alloy'
          })
        });
        
        if (!response.ok) {
          throw new Error('Failed to get ephemeral key');
        }
        
        const { client_secret } = await response.json();
        const ephemeralKey = client_secret.value;
        console.log('[DEBUG] ✅ Ephemeral key received');
        addMessage('system', '✅ 已取得連線密鑰...');
        
        // Step 2: Connect directly to OpenAI Realtime WebSocket
        // Pass ephemeral key via query parameter (browser WebSocket doesn't support custom headers)
        const wsUrl = `wss://api.openai.com/v1/realtime/conversation?Authorization=Bearer_${encodeURIComponent(ephemeralKey)}&OpenAI-Beta=realtime=v1`;
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
          console.log('[DEBUG] 🔌 Connected to OpenAI!');
          addMessage('system', '✅ 已連接，開始說話...');
          isConnected = true;
          
          document.getElementById('callBtn').classList.add('recording');
          document.getElementById('hangupBtn').classList.remove('hidden');
          document.getElementById('waveform').classList.remove('hidden');
          
          // Configure session for Chinese voice assistant
          ws.send(JSON.stringify({
            type: 'session.update',
            session: {
              modalities: ['audio', 'text'],
              instructions: '你是個友善的語音助理，請用繁體中文簡潔回覆。',
              voice: 'alloy',
              input_audio_transcription: { model: 'whisper-1' }
            }
          }));
          
          // Start audio capture
          startAudioCapture();
        };
        
        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          console.log('[DEBUG] 📥 OpenAI:', msg.type);
          
          switch (msg.type) {
            case 'session.created':
              console.log('[DEBUG] ✅ Session created');
              break;
              
            case 'conversation.item.input_audio_transcription.completed':
              if (msg.transcript) {
                console.log('[DEBUG 1] 🎤 Transcription:', msg.transcript);
                addMessage('system', `🎤 ${msg.transcript}`);
                addMessage('user', `👤 ${msg.transcript}`);
              }
              break;
              
            case 'response.done':
              if (msg.response?.output) {
                msg.response.output.forEach(item => {
                  if (item.content) {
                    item.content.forEach(c => {
                      if (c.type === 'text' && c.text) {
                        console.log('[DEBUG 2] 🤖 LLM:', c.text);
                        addMessage('system', `🤖 ${c.text}`);
                        addMessage('ai', `🤖 ${c.text}`);
                      }
                    });
                  }
                });
              }
              break;
              
            case 'response.audio.delta':
              // Audio delta - would need to accumulate and play
              if (msg.delta) {
                console.log('[DEBUG 3] 🔊 Audio delta:', msg.delta.substring(0, 50));
              }
              break;
              
            case 'response.audio.done':
              console.log('[DEBUG 3] ✅ Audio done');
              break;
              
            case 'error':
              console.error('[DEBUG] ❌ Error:', msg.error);
              addMessage('system', `❌ ${msg.error?.message || 'Unknown error'}`);
              break;
          }
        };
        
        ws.onerror = (err) => {
          console.error('[DEBUG] ❌ WS error:', err);
          addMessage('system', '❌ 連線錯誤');
        };
        
        ws.onclose = () => {
          console.log('[DEBUG] 🔌 Closed');
          addMessage('system', '🔌 已斷線');
          isConnected = false;
          stopRecording();
        };
        
      } catch (error) {
        console.error('[DEBUG] ❌ Failed:', error);
        addMessage('system', `❌ 連線失敗: ${error.message}`);
      }
    }
    
    async function startAudioCapture() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Set up audio context for VAD
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.3;
        source.connect(analyser);
        
        // Set up MediaRecorder to capture audio chunks
        const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = () => {
          console.log('[DEBUG] 🎤 Recording stopped, chunks:', audioChunks.length);
          if (audioChunks.length > 0 && ws && ws.readyState === WebSocket.OPEN) {
            // Send accumulated audio
            const audioBlob = new Blob(audioChunks, { type: mimeType });
            const reader = new FileReader();
            reader.onload = () => {
              const base64 = reader.result.split(',')[1];
              console.log('[DEBUG] 📤 Sending audio, size:', base64.length);
              ws.send(JSON.stringify({
                type: 'input_audio_buffer.append',
                audio: base64
              }));
              ws.send(JSON.stringify({
                type: 'input_audio_buffer.commit',
                type: 'conversation.item.create',
                item: {
                  type: 'input_audio_buffer',
                  audio: base64
                }
              }));
            };
            reader.readAsDataURL(audioBlob);
          }
          audioChunks = [];
        };
        
        mediaRecorder.start(500); // Send every 500ms for lower latency
        console.log('[DEBUG] 🎙️ Recording started');
        
        // Start VAD
        startVAD();
        
      } catch (error) {
        console.error('[DEBUG] ❌ Mic error:', error);
        addMessage('system', `❌ 無法訪問麥克風: ${error.message}`);
        stopCall();
      }
    }
    
    function startVAD() {
      console.log('[DEBUG VAD] 🔍 VAD monitoring...');
      stopVAD();
      
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      silenceTimer = setInterval(() => {
        if (!isConnected) return;
        
        analyser.getByteFrequencyData(dataArray);
        const sum = dataArray.reduce((a, b) => a + b, 0);
        const average = sum / dataArray.length;
        
        console.log('[DEBUG VAD] 📊 Level:', average.toFixed(1), average < SILENCE_THRESHOLD ? '(silence)' : '(speech)');
        
        if (average < SILENCE_THRESHOLD) {
          if (!silenceStart) silenceStart = Date.now();
          else if (Date.now() - silenceStart >= SILENCE_DURATION) {
            console.log('[DEBUG VAD] ✅✅ 1.5s silence - commit audio!');
            silenceStart = null;
            commitAudio();
          }
        } else if (average > SPEECH_THRESHOLD) {
          silenceStart = null;
        }
      }, 200);
    }
    
    function commitAudio() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      
      // Restart recording for next phrase
      setTimeout(() => {
        if (isConnected) {
          const stream = document.querySelector('video')?.srcObject || 
                        document.querySelector('audio')?.srcObject;
          if (stream) {
            // Reuse existing stream
            const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            mediaRecorder.start(500);
          }
        }
      }, 100);
    }
    
    function stopVAD() {
      if (silenceTimer) {
        clearInterval(silenceTimer);
        silenceTimer = null;
      }
    }
    
    function stopRecording() {
      console.log('[DEBUG] 🛑 Stopping...');
      stopVAD();
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      document.getElementById('callBtn').classList.remove('recording');
      document.getElementById('callBtn').textContent = '🎤';
      document.getElementById('hangupBtn').classList.add('hidden');
      document.getElementById('waveform').classList.add('hidden');
    }
    
    function stopCall() {
      console.log('[DEBUG] 🛑🛑 Stop call');
      isConnected = false;
      stopRecording();
      if (ws) {
        ws.close();
        ws = null;
      }
    }
    
    // Events
    document.getElementById('callBtn').addEventListener('click', () => {
      isConnected ? stopCall() : startCall();
    });
    document.getElementById('hangupBtn').addEventListener('click', stopCall);
    
    console.log('[DEBUG] 🚀 Ready');
  </script>
</body>
</html>
